<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="src/index.css">
    
    <title>Study Buddy</title>
</head>
<body>
    <div class="sidebar side-navbar justify-content-center active-nav d-flex flex-wrap " id="sidebar">
        <div class="judul">
            <h1>Study-Buddy</h1>
            <h4>Academic Architect</h4>
        </div>
        <div class="list">
            <ul>
                <li><a class="nav-link " href="#home">Home</a></li>
                <li><a class="nav-link " href="#session">Session</a></li>
                <li><a class="nav-link " href="#rank">Rank</a></li>
                <li><a class="nav-link " href="#profile">Profile</a></li>
            </ul>
        </div>
    </div>
    <div class="main">

        <div class="header">
            <div class="search">
                <span>Search Bar</span>
            </div>
            <span class="notification-icon"></span>
            <div class="profile">
                <div>
                    <span class="profile-icon">icon</span>
                </div>
                <div>
                    <span class="profile-name">Muhammad Hasbi</span>
                    <span class="status">Premium Scholar</span>
                </div>
                
            </div>
        </div>

        <div class="opening">
            <div class="halo">
                <h3>Welcome back, Hasbi!</h3>
                <p>Let's get back to work and achieve your goals together.</p>
        </div>
        <div class="level">
            <span>level 1 (exp dan sebagainya)</span>
        </div>
        </div>
       

        <div class="request">
            <h1>Stuck on a topic?</h1>
            <p>Get help from your study buddy!</p>
            <button class="request-button">Request Study Help</button>
        </div>

        <div class="queue">

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
